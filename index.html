<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Gallery</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="aurora"></div>
    <main class="container">
      <header class="hero">
        <h1>Upload Gallery</h1>
        <p>Sube, visualiza y descarga imágenes y videos.</p>
      </header>
      <section class="panel">
        <h2>Subir archivos</h2>
        <form id="upload-form" class="upload-row">
          <input
            id="media-files"
            type="file"
            accept="image/*,video/*"
            multiple
            required
          />
          <button type="submit">Subir</button>
          <button id="refresh-btn" type="button">Actualizar galería</button>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Galería</h2>
        <div id="gallery" class="gallery"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
